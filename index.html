        [class^="IN_lbl-radio"] {
            width: fit-content;
            line-height: 2;
        }

        /* Details summary - PAB replacement */
        details {
            --shadowColor: rgba(0, 0, 0, 0);
            margin: 1.618rem 0;
            border: 1px solid rgba(96, 96, 128, .1);
            background-color: rgba(255, 255, 255, .3);
            box-shadow: 0 4px 4px var(--shadowColor);
            transition: box-shadow .3s ease-out;
        }

        details:focus-within,
        details:not([open]):hover {
            --shadowColor: rgba(0, 0, 0, .3);
        }

        summary {
            font-size: 1.115rem;
            letter-spacing: -.01em;
            line-height: 1.3;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: hsl(269, 19%, 30%);
            font-weight: 400;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, .7);
            padding: .618rem .236rem .618rem 1rem;
            transition:
                color .3s ease-out,
                background-color .3s ease-out;
        }

        summary::marker {
            color: hsl(214, 71%, 47%);
        }

        summary:hover,
        summary:focus {
            color: hsl(214, 71%, 47%);
            background-color: #f7f7f7;
        }

        summary:focus-visible {
            outline: .25rem solid hsl(214, 100%, 85%);
            outline-offset: -.125rem;
        }

        .details_content {
            padding: .618rem 1rem;
            border-top: 1px solid rgba(0, 0, 0, .1);
        }

        .details_content>h2 {
            margin-top: 0;
        }

        .details_content>ul+h2 {
            margin-top: 1rem;
        }

        .details_content>ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .details_content li {
            margin: 0;
        }

        .details_content li+li {
            margin-top: .618rem;
        }

        /* Click spot */
        [data-spot] {
            position: relative;
            overflow: hidden
        }

        [data-spot] * {
            pointer-events: none
        }

        .spot-hex {
            display: block;
            position: absolute;
            overflow: hidden;
            transform: rotatez(0) scale(0);
            opacity: 1;
            transform-origin: 50% 50% 0px;
        }

        .spot-hex use {
            fill: hsl(214, 100%, 70%)
        }

        .grid-propertyRange {
            align-items: flex-start;

        .range-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;

        .frm_fld {

            background-color: var(--inpBg);

        .btn-remove {

<script id=responsive_font_calculator_js>

    const Calculator = (_ => {

        'use strict';

        // Start - Allow only numeric inputs //

        // Limit to four rounded decimal places.
        const sanitize = value => Math.round(value * 10000) / 10000;

        const setInputFilter = (input, prop, filter) => {
            ['input', 'keydown', 'keyup', 'mousedown', 'mouseup', 'select', 'contextmenu', 'drop'].forEach(event =>
                input.addEventListener(event, e => {
                    const target = e.target;
                    if (filter(target.value)) {
                        target.oldValue = target.value;
                        target.oldSelectionStart = target.selectionStart;
                        target.oldSelectionEnd = target.selectionEnd;
                    } else if (target.hasOwnProperty('oldValue')) {
                        target.value = target.oldValue;
                        target.setSelectionRange(target.oldSelectionStart, target.oldSelectionEnd);
                    } else {
                        target.value = '';
                    }
                    if (SETTINGS[prop] && typeof SETTINGS[prop].set === 'function') {
                        SETTINGS[prop].set(target.value);
                    }
                })
            );
        }


        const setNumericInputEvents = prop => {

            const obj = SETTINGS[prop].obj;

            setInputFilter(obj, prop, value =>
                obj.hasAttribute('data-allowNegative') ?
                    /^[-]?\d*\.?\d*$/.test(value) : // Allow '-', digits and '.' only
                    /^\d*\.?\d*$/.test(value)       // Allow digits and '.' only
            );
        };

        // End - allow only numeric inputs //


        const setNumericInputValues = (prop, value) => {

            if (isNaN(value) || value === '') return;
            // value = sanitize(value);

            SETTINGS[prop].obj.value = value;
            SETTINGS[prop].value = value + '';
            updateOutput();
        };

        const setTextInputValue = (prop, value) => {
            SETTINGS[prop].obj.value = value;
            SETTINGS[prop].value = value;
            updateOutput();
        };


        const radiosUnits = document.querySelectorAll('.IN_radio[name="unit"]');
        const radiosMethods = document.querySelectorAll('.IN_radio[name="method"]');

        const radiosSet = (set, val) => {
            for (const rad of set) {
                if (rad.value === val) {
                    rad.setAttribute('checked', true);
                } else {
                    rad.removeAttribute('checked');
                }
            }
        };

        const setCheckedInputValues = (prop, value) => {
            value += '';
            if (value === 'true') {
                SETTINGS[prop].obj.setAttribute('checked', true);
            } else {
                SETTINGS[prop].obj.removeAttribute('checked');
            }
            SETTINGS[prop].value = value + '';
            updateOutput();
        };

        const SETTINGS = {

            // Each primary key is an input or radio fieldset.

            units: {
                value: 'px',
                previousValue: 'px',
                init: _ => {
                    for (const rad of radiosUnits) {
                        rad.addEventListener('click', e => SETTINGS.units.set(e.target.value));
                        // Reset when returning from a back button click
                        // if (rad.hasAttribute('checked')) rad.click();
                    }
                },
                set: value => {
                    SETTINGS.units.previousValue = SETTINGS.units.value;
                    SETTINGS.units.value = value;
                    radiosSet(radiosUnits, value);
                    convertNumericValues();
                    updateOutput();
                    updateUnits();
                }
            },

            selector: {
                obj: document.querySelector('.IN-selector'),
                value: ':root',
                init: _ =>
                    SETTINGS.selector.obj.addEventListener('input', e => SETTINGS.selector.set(e.target.value)),
                set: value => setTextInputValue('selector', value)
            },

            property: {
                obj: document.querySelector('.IN-property'),
                value: '',
                init: _ =>
                    SETTINGS.property.obj.addEventListener('input', e => SETTINGS.property.set(e.target.value)),
                set: value => setTextInputValue('property', value)
            },

            // PROPERTY RANGE

            minFS: {
                obj: document.querySelector('.IN-minFS'),
                value: '16',
                init: _ => setNumericInputEvents('minFS'),
                set: value => setNumericInputValues('minFS', value)
            },

            maxFS: {
                obj: document.querySelector('.IN-maxFS'),
                value: '24',
                init: _ => setNumericInputEvents('maxFS'),
                set: value => setNumericInputValues('maxFS', value)
            },

            // VIEWPORT RANGE

            minVW: {
                obj: document.querySelector('.IN-minVW'),
                value: '768',
                init: _ => setNumericInputEvents('minVW'),
                set: value => setNumericInputValues('minVW', value)
            },

            maxVW: {
                obj: document.querySelector('.IN-maxVW'),
                value: '1920',
                init: _ => setNumericInputEvents('maxVW'),
                set: value => setNumericInputValues('maxVW', value)
            },

            // CSS METHODS

            methods: {
                value: 'stops',
                init: _ => {
                    for (const rad of radiosMethods) {
                        rad.addEventListener('click', e => SETTINGS.methods.set(e.target.value));

                        // Reset when returning from a back button click
                        // if (rad.hasAttribute('checked')) rad.click();
                    }
                },
                set: value => {
                    SETTINGS.methods.value = value;
                    radiosSet(radiosMethods, value);
                    updateOutput();
                }
            },

            // OPTIONS

            // comments: { ...},
            // safarifix: { ...},
            // longhand: { ...}


        };

        const OUTPUT = {
            text: '',
            value: ''
        };


        // Copy button visuals - processing is an external function

        const initCopyBtn = _ => {
            const btn = document.getElementById('btn_copy');
            if (btn) {
                btn.originalText = btn.textContent;
                btn.clickedText = btn.textContent.replace('Copy', 'Copied');
            }
            return btn;
        };

        const btn_cpy = initCopyBtn();

        const resetCopyBtn = _ => {
            if (btn_cpy) {
                btn_cpy.textContent = btn_cpy.originalText;
                btn_cpy.classList.remove('green');
                btn_cpy.classList.add('orange');
            }
        };

        /* ---------------- MULTI PROPERTY RANGES ---------------- */
        let propertyRanges = [];

        function addRange(min = 16, max = 24) {
            const container = document.querySelector('.range-grid');
            const index = propertyRanges.length + 1; // 1-based

            const propertyName = `--gb_font_size_${index}`;

            const div = document.createElement('div');
            div.className = 'flexed-fromto';
            div.innerHTML = `
        <label for="IN_minFS_${index}">from</label>
        <input class="IN-minFS" id="IN_minFS_${index}" type="text" value="${min}" required data-allowNegative>
        <label for="IN_maxFS_${index}">to</label>
        <input class="IN-maxFS" id="IN_maxFS_${index}" type="text" value="${max}" required data-allowNegative>
        <span class="units">${SETTINGS.units.value}</span>
        <button type="button" class="btn-remove">
            <svg width="16" height="2" viewBox="0 0 16 2" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line y1="1" x2="16" y2="1" stroke="#3a2c49" stroke-width="2" class="icon"></line>
            </svg>
        </button>
    `;

            container.appendChild(div);

            const minObj = div.querySelector('.IN-minFS');
            const maxObj = div.querySelector('.IN-maxFS');
            const removeBtn = div.querySelector('.btn-remove');

            propertyRanges.push({ div, minObj, maxObj, property: propertyName });

            setInputFilter(minObj, null, v => /^-?\d*\.?\d*$/.test(v));
            setInputFilter(maxObj, null, v => /^-?\d*\.?\d*$/.test(v));

            minObj.addEventListener('input', updateOutput);
            maxObj.addEventListener('input', updateOutput);

            removeBtn.addEventListener('click', () => {
                div.remove();
                propertyRanges = propertyRanges.filter(r => r.div !== div);
                updateOutput();
                refreshVarOptions();
            });

            updateOutput();
            refreshVarOptions();
        }


        document.getElementById('btnAddRange')
            .addEventListener('click', () => addRange());


        function initDefaultRange() {
            const minObj = document.querySelector('.IN-minFS');
            const maxObj = document.querySelector('.IN-maxFS');
            if (minObj && maxObj) {
                propertyRanges.push({ minObj, maxObj });

                setInputFilter(minObj, null, v => /^-?\d*\.?\d*$/.test(v));
                setInputFilter(maxObj, null, v => /^-?\d*\.?\d*$/.test(v));

                minObj.addEventListener('input', updateOutput);
                maxObj.addEventListener('input', updateOutput);
            }
        }
        const unitRadios = document.querySelectorAll('.IN_radio[name="unit"]');

        function getSelectedUnit() {
            const checked = Array.from(unitRadios).find(r => r.checked);
            return checked ? checked.value : 'px';
        }
        function getVarName(i) {
            return `--gb_font_size_${i + 1}`;
        }

        let classRows = [];
        const btnAddClassVar = document.getElementById('btnAddClassVar');
        const resultClassVarCSS = document.getElementById('resultClassVarCSS');
        const resultJsonClassVarCSS = document.getElementById('resultJsonClassVarCSS');
        const btnCopyClassVarCSS = document.getElementById('btnCopyClassVarCSS');
        const btnCopyJsonClassVarCSS = document.getElementById('btnCopyJsonClassVarCSS');
        const btnCopyMainCSS = document.getElementById('btnCopyMainCSS');
        const classVariableGrid = document.getElementById('classVariableGrid');
        const selectorInput = document.getElementById('IN_selector');

        function createClassRow(className = '', classVar = '') {
            const div = document.createElement('div');
            div.className = 'class-variable-row';
            div.innerHTML = `
      <input type="text" class="className" placeholder="class-name (no dot)" value="${className}">
      <input type="text" class="classVar" placeholder="variable (e.g. --gb_font_size_0)" value="${classVar}">
      <select class="varSelect"></select>
      <button type="button" class="btn-remove"><svg width="16" height="2" viewBox="0 0 16 2" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line y1="1" x2="16" y2="1" stroke="#3a2c49" stroke-width="2" class="icon"></line>
            </svg></button>
    `;
            classVariableGrid.appendChild(div);

            const classInput = div.querySelector('.className');
            const varInput = div.querySelector('.classVar');
            const select = div.querySelector('.varSelect');
            const removeBtn = div.querySelector('.btn-remove');

            classInput.addEventListener('input', updateClassVarOutput);
            varInput.addEventListener('input', updateClassVarOutput);
            select.addEventListener('change', () => {
                if (select.value) {
                    varInput.value = select.value;
                    updateClassVarOutput();
                }
            });
            removeBtn.addEventListener('click', () => {
                div.remove();
                classRows = classRows.filter(r => r.div !== div);
                updateClassVarOutput();
            });

            classRows.push({ div, classInput, varInput, select });
            refreshVarOptions();
            updateClassVarOutput();
        }

        function refreshVarOptions() {
            const opts = [{ v: '', t: '-- pick variable --' }];
            propertyRanges.forEach((_, i) => opts.push({ v: getVarName(i), t: getVarName(i) }));
            classRows.forEach(r => {
                const prev = r.select.value;
                r.select.innerHTML = opts.map(o => `<option value="${o.v}">${o.t}</option>`).join('');
                if (opts.some(o => o.v === prev)) r.select.value = prev;
            });
        }

        function updateClassVarOutput() {
            const validRows = classRows
                .filter(r => r.classInput.value.trim() && r.varInput.value.trim());

            // --- Build CSS ---
            const cssLines = validRows.map(r => {
                const cls = r.classInput.value.trim().replace(/^\./, '');
                return `.${cls} { font-size: var(${r.varInput.value.trim()}); }`;
            });
            resultClassVarCSS.textContent = cssLines.join('\n');

            // --- Build JSON ---
            const objects = validRows.map((r, i) => {
                const cls = r.classInput.value.trim().replace(/^\./, '');
                return {
                    slug: cls,
                    size: `var(${r.varInput.value.trim()})`,
                    name: cls
                };
            });

            const jsonString = objects
                .map(obj => JSON.stringify(obj, null, 2))
                .join(',\n');   // <- no [ ]

            resultJsonClassVarCSS.textContent = jsonString;
            refreshVarOptions();
        }


        function updateUnitLabels() {
            const unit = getSelectedUnit();
            document.querySelectorAll('.units').forEach(span => {
                span.textContent = unit;
            });
        }



        const updateNumericValues = _ => {
            SETTINGS.minFS.obj.value = SETTINGS.minFS.value;
            SETTINGS.maxFS.obj.value = SETTINGS.maxFS.value;
            SETTINGS.minVW.obj.value = SETTINGS.minVW.value;
            SETTINGS.maxVW.obj.value = SETTINGS.maxVW.value;
        }

        const convertNumericValues = _ => {
            const prevUnit = SETTINGS.units.previousValue;
            const unit = SETTINGS.units.value;
            switch (unit) {
                case 'px':
                    switch (prevUnit) {
                        case 'em':
                        case 'rem':
                            // multiply by 16
                            SETTINGS.minFS.value = SETTINGS.minFS.value * 16;
                            SETTINGS.maxFS.value = SETTINGS.maxFS.value * 16;
                            SETTINGS.minVW.value = SETTINGS.minVW.value * 16;
                            SETTINGS.maxVW.value = SETTINGS.maxVW.value * 16;
                            updateNumericValues();
                            break;
                    }
                    break;
                case 'em':
                case 'rem':
                    switch (prevUnit) {
                        case 'px':
                            // divide by 16
                            SETTINGS.minFS.value = SETTINGS.minFS.value / 16;
                            SETTINGS.maxFS.value = SETTINGS.maxFS.value / 16;
                            SETTINGS.minVW.value = SETTINGS.minVW.value / 16;
                            SETTINGS.maxVW.value = SETTINGS.maxVW.value / 16;
                            updateNumericValues();
                            break;
                    }
                    break;
            }
        }


        const updateUnits = _ => {
            let units = document.querySelectorAll('.units');
            for (const unit of units) {
                unit.textContent = SETTINGS.units.value;
            }
        }



        /* Local Storage */

        const useLocalStorage = (function () {
            try {
                return 'localStorage' in window && window['localStorage'] !== null;
            } catch (e) {
                return false;
            }
        }());

        const getStoragePropertyValue = prop => {
            if (!useLocalStorage) return;
            const store = JSON.parse(localStorage.getItem('FRPCalc'));
            if (!store) return;
            return store[prop];
        };

        const setStoragePropertyValues = _ => {
            if (!useLocalStorage) return;
            const store = {};
            Object.keys(SETTINGS).forEach(function (prop) {
                store[prop] = SETTINGS[prop].value + '';
            });
            localStorage.setItem('FRPCalc', JSON.stringify(store));
        };




        const updateOutput = _ => {
            const resultCSS = document.getElementById('resultCSS');
            if (!resultCSS) return;

            resetCopyBtn();

            let finalStr = '';

            // Loop through each property range input set
            propertyRanges.forEach((range, i) => {
                const unit = SETTINGS.units.value;
                const selector = SETTINGS.selector.value;
                const property = range?.property || '--gb_font_size_1';
                const minFS = sanitize(range.minObj.value);
                const maxFS = sanitize(range.maxObj.value);
                const minVW = sanitize(SETTINGS.minVW.value);
                const maxVW = sanitize(SETTINGS.maxVW.value);
                const method = SETTINGS.methods.value;

                const useClamp = method === 'clamp';
                const useMinmax = method === 'minmax';
                const useStops = method === 'stops';
                // const useComments = SETTINGS.comments.obj.checked;
                // const useSafariFix = SETTINGS.safarifix.obj.checked;
                // const useLonghand = SETTINGS.longhand.obj.checked;

                const strTab = (useMinmax || useClamp) ? '' : '  ';

                const getMultiplier = _ => {
                    let multiplier = 100 * (maxFS - minFS);
                    multiplier /= (maxVW - minVW);
                    return sanitize(multiplier) + '';
                };

                const multiplier = getMultiplier();
                const baseSize = (unit === 'px') ? minFS / 16 : minFS;


                let strCalc = `calc(${baseSize}rem + ((1vw - ${(minVW / 100) + unit}) * ${multiplier}))`;

                const strFS = `${property}: ${strCalc};`;

                // Build output string for this range
                let str = '';

                let queryStr = '';

                let methodStr = `  ${property}: clamp(${Math.min(minFS, maxFS)}${unit}, ${strCalc}, ${Math.max(minFS, maxFS)}${unit});\n`;


                let safariStr = '';

                let stopStr = '';


                str += methodStr;

                str += safariStr;

                finalStr += str + '\n';
            });

            // Local storage (optional: store only last range or merge)
            setStoragePropertyValues();

            OUTPUT.value = finalStr;
            resultCSS.textContent = finalStr;

            if (typeof Prism === 'object') {
                Prism.highlightElement(resultCSS);
            }
        };



        // Open settings and for each primary run initialise and set the values

        const initialise = _ => {

            // Default values have to be set prior to initialisation
            Object.keys(SETTINGS).forEach(function (prop) {
                const value = getStoragePropertyValue(prop) || SETTINGS[prop].value;
                SETTINGS[prop].value = value;
            });

            Object.keys(SETTINGS).forEach(function (prop) {
                SETTINGS[prop].init();
                SETTINGS[prop].set(SETTINGS[prop].value);
            });
        }

        btnCopyClassVarCSS.addEventListener('click', () => {
            navigator.clipboard.writeText(resultClassVarCSS.textContent || '');
            btnCopyClassVarCSS.textContent = 'Copied!';
            setTimeout(() => btnCopyClassVarCSS.textContent = 'Copy Class Variable CSS', 1200);
        });

        btnCopyJsonClassVarCSS.addEventListener('click', () => {
            navigator.clipboard.writeText(resultJsonClassVarCSS.textContent || '');
            btnCopyJsonClassVarCSS.textContent = 'Copied!';
            setTimeout(() => {
                btnCopyJsonClassVarCSS.textContent = 'Copy Class Variable CSS';
            }, 1200);
        });


        btnAddClassVar.addEventListener('click', () => createClassRow('', ''));
        createClassRow('', '');
        updateClassVarOutput();
        updateUnitLabels();
        initDefaultRange();
        initialise();
        updateUnits();

        return {
            SETTINGS: SETTINGS,
            OUTPUT: OUTPUT
        }

    })();
</script>
